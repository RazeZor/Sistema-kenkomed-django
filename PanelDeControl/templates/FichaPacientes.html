
{% load static %}

<!doctype html>
<html lang="es">
<head>
    <title>Panel De Control</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="{% static 'CSS/FichaPaciente.css' %}">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <span class="navbar-brand">
                <i class='bx bx-plus-medical me-2'></i>Sistema Clínico
            </span>
        </div>
    </nav>

    <div class="d-flex">
        <main class="main-content">
            <div>
                <form method="get" id="search-form">
                    
                </form>
            </div>
            <div class="container-fluid">
                {% if encontrado == False %}
                    <div class="error-container">
                        <div class="error-card">
                            <div class="error-icon">
                                <i class='bx bx-error-circle'></i>
                            </div>
                            <h1 class="error-title">Paciente no encontrado</h1>
                            <div class="error-message">
                                {{ mensaje }}
                            </div>
                            <div class="error-actions">
                                <a href="{% url 'historialClinico' %}" class="btn-primary">
                                    <i class='bx bx-search-alt'></i> Buscar otro paciente
                                </a>
                                <a href="{% url 'panel' %}" class="btn-secondary">
                                    <i class='bx bx-home'></i> Volver al inicio
                                </a>
                            </div>
                        </div>
                    </div>
                {% else %}
                    <div class="overlay active" id="overlay">
                        {% if informe %}
                        <div class="ficha">
                            {{ informe|safe }}
                        </div>
                        {% endif %}
                    </div>
                {% endif %}
            </div>
        </main>
    </div>

    <footer class="text-center text-white">
        <p class="mb-0">&copy; 2024 Dashboard Clínico - Todos los derechos reservados</p>
    </footer>
    
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Función para cerrar el overlay
            function closeOverlay() {
                const overlay = document.getElementById('overlay');
                if (overlay) {
                    overlay.classList.remove('active');
                    window.location.href = "{% url 'historialClinico' %}";
                }
            }
    
            // Cerrar el overlay al hacer clic fuera del contenido
            const overlay = document.getElementById('overlay');
            if (overlay) {
                overlay.addEventListener('click', function(e) {
                    if (e.target === this) {
                        closeOverlay();
                    }
                });
            }
        });
    </script>
</body>
</html>
