<div class="flex flex-col items-center justify-center p-1 rounded-md border text-center 
    {% if score == max %}
        bg-emerald-50 border-emerald-100 text-emerald-700
    {% elif score > 0 %}
        bg-amber-50 border-amber-100 text-amber-700
    {% else %}
        bg-red-50 border-red-100 text-red-700
    {% endif %}">
    <span class="text-[9px] font-bold uppercase tracking-wider text-opacity-80">{{ label }}</span>
    <span class="text-xs font-black">{{ score }}</span>
</div>
