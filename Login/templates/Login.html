{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KenkoMed | Iniciar Sesión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        medical: {
                            blue: '#0284c7',
                            'blue-light': '#38bdf8',
                            'blue-dark': '#0369a1',
                            green: '#10b981',
                            red: '#ef4444',
                            orange: '#f59e0b',
                            teal: '#14b8a6'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <!-- JavaScript global del proyecto -->
    <link rel="stylesheet" href="{% static 'css/inputRut.css' %}">
    <script src="{% static 'js/utils.js' %}"></script>
    <style>
        .bg-blur {
            position: relative;
        }
        .bg-blur::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('{% static "image/LoginKenKommed2.png" %}');
            background-size: cover;
            background-position: center;
            filter: blur(8px);
            z-index: -2;
            transform: scale(1.05); /* Evita bordes blancos por el blur */
        }
        
        .bg-blur::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(2, 132, 199, 0.85), rgba(3, 105, 161, 0.90));
            z-index: -1;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen bg-blur font-sans">
    
    <div class="w-full max-w-[420px] mx-4 relative z-10">
        
        <!-- Contenedor Principal -->
        <div class="bg-white/95 backdrop-blur-xl rounded-2xl shadow-2xl overflow-hidden border border-white/20">
            <!-- Barra superior decorativa -->
            <div class="h-2 w-full bg-gradient-to-r from-medical-blue-light via-medical-blue to-medical-blue-dark"></div>
            
            <div class="p-8 sm:p-10">
                <!-- Logo y título -->
                <div class="mb-10 text-center">
                    <img src="{% static 'image/LogoKenKoMed.jpeg' %}" alt="KenkoMed Logo" class="h-20 mx-auto mb-5 rounded-2xl shadow-sm border border-gray-100 object-cover bg-white">
                    <h1 class="text-2xl font-bold text-gray-900 tracking-tight">Acceso Clínico</h1>
                    <p class="text-sm text-gray-500 mt-2 font-medium">Ingrese sus credenciales para continuar</p>
                </div>
                
                <form class="space-y-6" id="loginForm" method="post" action="{% url 'login' %}">
                    {% csrf_token %}

                    {% if messages %}
                        <div class="mb-6 space-y-2">
                            {% for message in messages %}
                                <div class="px-4 py-3 rounded-lg bg-red-50 border border-red-100 flex items-start gap-3">
                                    <i class='bx bx-error-circle text-red-500 text-lg mt-0.5'></i>
                                    <p class="font-medium text-red-700 text-sm">{{ message }}</p>
                                </div>
                            {% endfor %}
                        </div>
                    {% endif %}
                    
                    <div class="space-y-5">
                        <!-- RUT -->
                        <div>
                            <label for="rut" class="block text-sm font-semibold text-gray-700 mb-2">RUT</label>
                            <div class="relative flex items-center">
                                <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-gray-400">
                                    <i class='bx bx-id-card text-xl'></i>
                                </div>
                                <input 
                                    type="text" 
                                    class="w-full pl-11 pr-4 py-3.5 bg-gray-50 border border-gray-200 text-gray-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-medical-blue/20 focus:border-medical-blue focus:bg-white transition-all text-sm font-medium rut-input" 
                                    maxlength="12" 
                                    name="rut" 
                                    id="rut" 
                                    placeholder="12.345.678-9" 
                                    pattern="[0-9]{1,2}\.[0-9]{3}\.[0-9]{3}-[0-9Kk]{1}" 
                                    title="Formato: 12.345.678-9 o 12.345.678-K" 
                                    required
                                />
                            </div>
                        </div>
                        
                        <!-- Contraseña -->
                        <div>
                            <label for="password" class="block text-sm font-semibold text-gray-700 mb-2">Contraseña</label>
                            <div class="relative flex items-center">
                                <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-gray-400">
                                    <i class='bx bx-lock-alt text-xl'></i>
                                </div>
                                <input 
                                    type="password" 
                                    id="password" 
                                    name="password" 
                                    class="w-full pl-11 pr-12 py-3.5 bg-gray-50 border border-gray-200 text-gray-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-medical-blue/20 focus:border-medical-blue focus:bg-white transition-all text-sm font-medium tracking-wider" 
                                    placeholder="••••••••" 
                                    required
                                >
                                <button 
                                    type="button" 
                                    id="togglePassword" 
                                    class="absolute inset-y-0 right-0 flex items-center pr-4 text-gray-400 hover:text-medical-blue focus:outline-none transition-colors" 
                                    title="Mostrar/ocultar contraseña"
                                >
                                    <i id="eyeIcon" class='bx bx-show text-xl'></i>
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="flex items-center justify-between pt-2">
                        <div class="flex items-center gap-2">
                            <input 
                                type="checkbox" 
                                id="remember" 
                                name="recordar" 
                                class="w-4 h-4 text-medical-blue border-gray-300 rounded focus:ring-medical-blue/50 focus:ring-2 cursor-pointer"
                            >
                            <label for="remember" class="text-sm font-medium text-gray-600 cursor-pointer select-none">Recordarme</label>
                        </div>
                        <a href="#" class="text-sm font-semibold text-medical-blue hover:text-medical-blue-dark transition-colors">¿Olvidó su contraseña?</a>
                    </div>
                    
                    <button 
                        type="submit" 
                        class="w-full px-6 py-4 mt-8 font-bold text-white transition-all rounded-xl shadow-lg shadow-medical-blue/30 bg-medical-blue hover:bg-medical-blue-dark hover:shadow-xl hover:-translate-y-0.5 focus:outline-none focus:ring-4 focus:ring-medical-blue/30 active:translate-y-0 flex items-center justify-center gap-2"
                    >
                        <span>Ingresar al Sistema</span>
                        <i class='bx bx-right-arrow-alt text-xl'></i>
                    </button>
                    
                </form>
            </div>
            
            <!-- Footer del form -->
            <div class="px-8 py-5 bg-gray-50/80 border-t border-gray-100 text-center">
                <p class="text-xs font-medium text-gray-500">
                    Sistema Clínico de KenkoMed &copy; {% now "Y" %}
                </p>
            </div>
        </div>
        
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Inicializar formateo de RUT
            if (typeof initializeKenkomedUtils === 'function') {
                initializeKenkomedUtils();
            }

            // Mostrar/Ocultar contraseña
            const togglePassword = document.getElementById('togglePassword');
            const password = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');

            if (togglePassword && password && eyeIcon) {
                togglePassword.addEventListener('click', function () {
                    const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
                    password.setAttribute('type', type);
                    
                    if (type === 'password') {
                        eyeIcon.classList.remove('bx-hide');
                        eyeIcon.classList.add('bx-show');
                    } else {
                        eyeIcon.classList.remove('bx-show');
                        eyeIcon.classList.add('bx-hide');
                    }
                });
            }
        });
    </script>
</body>
</html>
