{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSS - Sistema Clínico</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .logo-section {
            flex: 1.2;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background: #ffffff;
        }

        .logo {
            text-align: center;
            color: #2c5aa0;
        }

        .logo h1 {
            font-size: 4.5rem;
            font-weight: 300;
            letter-spacing: 8px;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(44, 90, 160, 0.1);
        }

        .logo p {
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 2px;
            opacity: 0.8;
            margin-top: 20px;
        }

        .login-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
        }

        .login-form {
            width: 100%;
            max-width: 350px;
        }

        .form-title {
            font-size: 1.8rem;
            color: #2c5aa0;
            margin-bottom: 40px;
            font-weight: 300;
            text-align: center;
        }

        .input-group {
            margin-bottom: 30px;
            position: relative;
        }

        .input-field {
            width: 100%;
            padding: 15px 0;
            border: none;
            border-bottom: 1px solid #ddd;
            background: transparent;
            font-size: 1rem;
            color: #333;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-bottom: 2px solid #2c5aa0;
        }

        .input-field:focus + .input-label,
        .input-field:not(:placeholder-shown) + .input-label {
            transform: translateY(-20px);
            font-size: 0.8rem;
            color: #2c5aa0;
        }

        .input-label {
            position: absolute;
            left: 0;
            top: 15px;
            color: #999;
            font-size: 1rem;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #2c5aa0, #4a7bc8);
            color: white;
            border: none;
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
            text-transform: uppercase;
        }

        .login-btn:hover {
            background: linear-gradient(135deg, #1e3f73, #2c5aa0);
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(44, 90, 160, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .forgot-password {
            text-align: center;
            margin-top: 25px;
        }

        .forgot-password a {
            color: #2c5aa0;
            text-decoration: none;
            font-size: 0.9rem;
            transition: opacity 0.3s ease;
        }

        .forgot-password a:hover {
            opacity: 0.7;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            
            .logo-section {
                flex: 0.4;
                padding: 20px;
            }
            
            .logo h1 {
                font-size: 3rem;
                letter-spacing: 4px;
            }
            
            .login-section {
                flex: 0.6;
                padding: 20px;
            }
        }

        .fade-in {
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <div class="logo fade-in">
                <img src="{% static 'image/LogoGrande.png' %}" alt="Logo" style="width:300px; height:auto; margin-bottom:20px;">
            </div>
        </div>
        
        <div class="login-section">
            <form class="login-form fade-in" id="loginForm" method="post" action="{% url 'login' %}">
                {% csrf_token %}
                <h2 class="form-title">Iniciar Sesión</h2>

                {% if messages %}
                    <div style="margin-bottom:16px">
                        {% for message in messages %}
                            <div style="color:#9b1111; font-weight:600;">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
                
                <div class="input-group">
                    <input type="text" id="rut" name="rut" class="input-field" placeholder=" " required>
                    <label for="rut" class="input-label">RUT</label>
                </div>
                
                <div class="input-group">
                    <input type="password" id="password" name="password" class="input-field" placeholder=" " required>
                    <label for="password" class="input-label">Contraseña</label>
                </div>
                
                <button type="submit" class="login-btn">Ingresar</button>
                
                <div class="forgot-password">
                    <a href="#" id="forgotPassword">¿Olvidaste tu contraseña?</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Validación ligera y submit real del formulario
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            const rut = document.getElementById('rut').value.trim();
            const password = document.getElementById('password').value.trim();
            if (!rut || !password) {
                e.preventDefault();
                alert('Por favor, completa todos los campos');
                return;
            }
            // El formulario hará POST al backend (validarLogin)
        });

        // Manejo de "olvidé mi contraseña" (puedes enlazar a una vista real)
        document.getElementById('forgotPassword').addEventListener('click', function(e) {
            e.preventDefault();
            alert('Funcionalidad de recuperación de contraseña - implementa endpoint en backend.');
        });

        // Efecto de focus en los inputs
        document.querySelectorAll('.input-field').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentNode.style.transform = 'scale(1.02)';
            });
            input.addEventListener('blur', function() {
                this.parentNode.style.transform = 'scale(1)';
            });
        });
    </script>
</body>
</html>
