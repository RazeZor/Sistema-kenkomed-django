{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KenkoMed - Sistema de Kinesiología</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-blur {
            position: relative;
        }
        .bg-blur::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('{% static 'image/kinesiology-hero.jpg' %}');
            background-size: cover;
            background-position: center;
            filter: blur(4px);
            z-index: -2;
        }
        .bg-blur::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.7);
            z-index: -1;
        }
    </style>
</head>
<body class="h-screen flex items-center justify-center bg-blur">
    <div class="max-w-md w-full mx-4">
        
        
        <div class="bg-white/80 backdrop-blur-sm rounded-lg shadow-lg p-8">
            <!-- Logo y título -->
        <div class="text-center mb-8">
            <img src="{% static 'image/LogoGrande.png' %}" alt="KineLogin" class="h-12 mx-auto mb-2">
            <p class="text-sm text-gray-600">Acceso profesional para kinesiólogos</p>
            <p class="text-sm text-gray-600">Ingresa tus credenciales para acceder al sistema</p>
        </div>
            <form class="space-y-6" id="loginForm" method="post" action="{% url 'login' %}">
                {% csrf_token %}

                {% if messages %}
                    <div class="mb-4">
                        {% for message in messages %}
                            <div class="text-red-600 font-semibold">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
                
                <div class="space-y-4">
                    <div class="relative">
                        <div class="flex items-center space-x-3">
                            <span class="text-gray-500">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                                </svg>
                            </span>
                             <input type="text" id="rut" name="rut" class="block w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="Ingresa tu RUT" required>
                
                        </div>
                    </div>
                    
                    <div class="relative">
                        <div class="flex items-center space-x-3">
                            <span class="text-gray-500">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                                </svg>
                            </span>
                            <input type="password" id="password" name="password" class="block w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="••••••••" required>
                        </div>
                    </div>
                </div>
                
                <div class="flex items-center justify-between mt-6">
                    <div class="flex items-center">
                        <input type="checkbox" id="remember" name="remember" class="h-4 w-4 text-blue-500 border-gray-300 rounded focus:ring-blue-500">
                        <label for="remember" class="ml-2 text-sm text-gray-600">Recordarme</label>
                    </div>
                </div>
                
                <button type="submit" class="w-full mt-6 px-4 py-3 bg-blue-500 text-white font-medium rounded-lg hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-colors flex items-center justify-center space-x-2">
                    <span>Iniciar Sesión</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                    </svg>
                </button>
                <p class="text-center mt-8 text-sm text-gray-600">
                    Sistema exclusivo para profesionales de kinesiología
                </p>
            </form>
        </div>
        
    </div>
    </div>

    <script>
        // Validación ligera y submit real del formulario
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            const rut = document.getElementById('rut').value.trim();
            const password = document.getElementById('password').value.trim();
            if (!rut || !password) {
                e.preventDefault();
                alert('Por favor, completa todos los campos');
                return;
            }
            // El formulario hará POST al backend (validarLogin)
        });

        // Efecto de focus en los inputs
        document.querySelectorAll('.input-field').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentNode.style.transform = 'scale(1.02)';
            });
            input.addEventListener('blur', function() {
                this.parentNode.style.transform = 'scale(1)';
            });
        });
    </script>
</body>
</html>
